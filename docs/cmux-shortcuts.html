<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cmux 快捷键速查表</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ====== 设计系统 ====== */
  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #111118;
    --bg-card: #16161e;
    --bg-card-hover: #1c1c26;
    --bg-kbd: #222230;
    --bg-kbd-border: #333348;
    --bg-search: #13131b;

    --text-primary: #e8e8ed;
    --text-secondary: #a0a0b8;
    --text-muted: #6b6b82;
    --text-kbd: #d0d0e0;

    --accent-violet: #8b5cf6;
    --accent-violet-dim: rgba(139, 92, 246, 0.12);
    --accent-blue: #3b82f6;
    --accent-cyan: #06b6d4;
    --accent-emerald: #10b981;
    --accent-amber: #f59e0b;
    --accent-rose: #f43f5e;
    --accent-pink: #ec4899;
    --accent-indigo: #6366f1;

    --border-subtle: rgba(255, 255, 255, 0.06);
    --border-card: rgba(255, 255, 255, 0.08);

    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-xl: 20px;

    --shadow-glow: 0 0 40px rgba(139, 92, 246, 0.08);
    --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.3), 0 1px 2px rgba(0, 0, 0, 0.2);

    --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
    --transition-default: 250ms cubic-bezier(0.4, 0, 0.2, 1);
    --transition-slow: 400ms cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* ====== 全局重置 ====== */
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    scroll-behavior: smooth;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ====== 背景装饰 ====== */
  body::before {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 80%;
    height: 80%;
    background: radial-gradient(ellipse, rgba(139, 92, 246, 0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -30%;
    right: -20%;
    width: 70%;
    height: 70%;
    background: radial-gradient(ellipse, rgba(59, 130, 246, 0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ====== 布局容器 ====== */
  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
    z-index: 1;
  }

  /* ====== 头部区域 ====== */
  .hero {
    padding: 64px 0 40px;
    text-align: center;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    background: var(--accent-violet-dim);
    border: 1px solid rgba(139, 92, 246, 0.2);
    border-radius: 100px;
    font-size: 12px;
    font-weight: 500;
    color: var(--accent-violet);
    letter-spacing: 0.03em;
    margin-bottom: 20px;
  }

  .hero-badge svg {
    width: 14px;
    height: 14px;
  }

  .hero h1 {
    font-size: 40px;
    font-weight: 700;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #e8e8ed 0%, #a0a0b8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
    line-height: 1.15;
  }

  .hero p {
    font-size: 16px;
    color: var(--text-muted);
    max-width: 520px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* ====== 搜索栏 ====== */
  .search-wrapper {
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 16px 0 12px;
    background: linear-gradient(180deg, var(--bg-primary) 60%, transparent 100%);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }

  .search-box {
    position: relative;
    max-width: 480px;
    margin: 0 auto;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
    transition: color var(--transition-fast);
  }

  .search-input {
    width: 100%;
    padding: 11px 14px 11px 42px;
    background: var(--bg-search);
    border: 1px solid var(--border-card);
    border-radius: var(--radius-lg);
    color: var(--text-primary);
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: all var(--transition-default);
  }

  .search-input::placeholder {
    color: var(--text-muted);
  }

  .search-input:focus {
    border-color: rgba(139, 92, 246, 0.4);
    box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1), var(--shadow-glow);
  }

  .search-input:focus + .search-icon,
  .search-input:focus ~ .search-icon {
    color: var(--accent-violet);
  }

  .search-hint {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    align-items: center;
    gap: 2px;
    opacity: 0.4;
    transition: opacity var(--transition-fast);
  }

  .search-hint kbd {
    font-family: inherit;
    font-size: 11px;
    padding: 1px 6px;
    background: var(--bg-kbd);
    border: 1px solid var(--bg-kbd-border);
    border-radius: 4px;
    color: var(--text-muted);
  }

  .search-input:focus ~ .search-hint {
    opacity: 0;
  }

  /* ====== 分类导航 ====== */
  .category-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    padding: 8px 0 32px;
  }

  .category-nav a {
    padding: 5px 12px;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--text-muted);
    text-decoration: none;
    border-radius: var(--radius-sm);
    border: 1px solid transparent;
    transition: all var(--transition-fast);
    white-space: nowrap;
  }

  .category-nav a:hover {
    color: var(--text-secondary);
    background: rgba(255, 255, 255, 0.03);
    border-color: var(--border-subtle);
  }

  .category-nav a.active {
    color: var(--accent-violet);
    background: var(--accent-violet-dim);
    border-color: rgba(139, 92, 246, 0.2);
  }

  /* ====== 分类区块 ====== */
  .categories {
    display: flex;
    flex-direction: column;
    gap: 36px;
    padding-bottom: 80px;
  }

  .category {
    scroll-margin-top: 80px;
    animation: fadeInUp 0.5s ease both;
  }

  .category:nth-child(1) { animation-delay: 0.05s; }
  .category:nth-child(2) { animation-delay: 0.1s; }
  .category:nth-child(3) { animation-delay: 0.15s; }
  .category:nth-child(4) { animation-delay: 0.2s; }
  .category:nth-child(5) { animation-delay: 0.25s; }
  .category:nth-child(6) { animation-delay: 0.3s; }
  .category:nth-child(7) { animation-delay: 0.35s; }
  .category:nth-child(8) { animation-delay: 0.4s; }
  .category:nth-child(9) { animation-delay: 0.45s; }

  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(12px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .category-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    padding-left: 2px;
  }

  .category-icon {
    width: 28px;
    height: 28px;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .category-icon svg {
    width: 15px;
    height: 15px;
  }

  .category-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: -0.01em;
  }

  .category-count {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    background: rgba(255, 255, 255, 0.04);
    padding: 1px 8px;
    border-radius: 100px;
    margin-left: auto;
  }

  /* ====== 快捷键卡片 ====== */
  .shortcuts-card {
    background: var(--bg-card);
    border: 1px solid var(--border-card);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow-card);
  }

  .shortcut-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 12px 16px;
    transition: background var(--transition-fast);
  }

  .shortcut-row:hover {
    background: var(--bg-card-hover);
  }

  .shortcut-row + .shortcut-row {
    border-top: 1px solid var(--border-subtle);
  }

  .shortcut-label {
    font-size: 13.5px;
    color: var(--text-primary);
    opacity: 0.88;
    min-width: 0;
    flex: 1;
  }

  .shortcut-note {
    font-size: 11.5px;
    color: var(--text-muted);
    margin-left: 8px;
  }

  .shortcut-keys {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .key-combo {
    display: inline-flex;
    align-items: center;
    gap: 3px;
  }

  .key-combo + .key-combo::before {
    content: '/';
    color: var(--text-muted);
    opacity: 0.35;
    font-size: 11px;
    margin-right: 3px;
    font-family: 'Inter', sans-serif;
  }

  kbd {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 24px;
    height: 26px;
    padding: 0 7px;
    background: var(--bg-kbd);
    border: 1px solid var(--bg-kbd-border);
    border-bottom-width: 2px;
    border-radius: 5px;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-kbd);
    line-height: 1;
    white-space: nowrap;
    transition: all var(--transition-fast);
  }

  .shortcut-row:hover kbd {
    background: rgba(139, 92, 246, 0.08);
    border-color: rgba(139, 92, 246, 0.2);
    color: #c4b5fd;
  }

  .key-plus {
    color: var(--text-muted);
    opacity: 0.3;
    font-size: 10px;
    font-weight: 600;
    user-select: none;
    margin: 0 1px;
  }

  /* ====== 无结果提示 ====== */
  .no-results {
    text-align: center;
    padding: 64px 20px;
    animation: fadeInUp 0.3s ease;
  }

  .no-results-icon {
    font-size: 40px;
    margin-bottom: 16px;
    opacity: 0.6;
  }

  .no-results h3 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }

  .no-results p {
    font-size: 13px;
    color: var(--text-muted);
  }

  /* ====== 页脚信息 ====== */
  .footer {
    text-align: center;
    padding: 32px 0 48px;
    border-top: 1px solid var(--border-subtle);
  }

  .footer p {
    font-size: 12px;
    color: var(--text-muted);
    opacity: 0.6;
  }

  /* ====== 高亮匹配文本 ====== */
  mark {
    background: rgba(139, 92, 246, 0.25);
    color: inherit;
    border-radius: 2px;
    padding: 0 1px;
  }

  /* ====== 隐藏类 ====== */
  .hidden {
    display: none !important;
  }

  /* ====== 分类颜色 ====== */
  .cat-workspaces .category-icon { background: rgba(139, 92, 246, 0.12); color: var(--accent-violet); }
  .cat-surfaces .category-icon { background: rgba(59, 130, 246, 0.12); color: var(--accent-blue); }
  .cat-panes .category-icon { background: rgba(16, 185, 129, 0.12); color: var(--accent-emerald); }
  .cat-browser .category-icon { background: rgba(6, 182, 212, 0.12); color: var(--accent-cyan); }
  .cat-find .category-icon { background: rgba(245, 158, 11, 0.12); color: var(--accent-amber); }
  .cat-terminal .category-icon { background: rgba(236, 72, 153, 0.12); color: var(--accent-pink); }
  .cat-notifications .category-icon { background: rgba(244, 63, 94, 0.12); color: var(--accent-rose); }
  .cat-window .category-icon { background: rgba(99, 102, 241, 0.12); color: var(--accent-indigo); }

  /* ====== 响应式 ====== */
  @media (max-width: 640px) {
    .hero h1 { font-size: 28px; }
    .hero { padding: 40px 0 24px; }
    .shortcut-row { padding: 10px 12px; gap: 10px; }
    .shortcut-label { font-size: 12.5px; }
    kbd { min-width: 20px; height: 22px; font-size: 11px; padding: 0 5px; }
    .category-nav { gap: 4px; }
    .category-nav a { font-size: 11.5px; padding: 4px 10px; }
  }
</style>
</head>

<div class="container">
  <!-- 头部区域 -->

  <nav class="category-nav" id="categoryNav"></nav>

  <!-- 快捷键内容 -->

  </footer>
</div>

  {

    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>',
    shortcuts: [

// ====== 渲染逻辑 ======
const searchInput = document.getElementById('searchInput');
const categoryNav = document.getElementById('categoryNav');
const categoriesContainer = document.getElementById('categoriesContainer');
const noResults = document.getElementById('noResults');

// 生成导航链接
function renderNav(categories) {
  categoryNav.innerHTML = categories.map(cat =>
    `<a href="#${cat.id}" data-cat="${cat.id}">${cat.title}</a>`
  ).join('');
}

// 生成按键组合的 HTML
function renderKeyCombo(combo) {
  return combo.map((key, i) => {
    const plus = i < combo.length - 1 ? '<span class="key-plus">+</span>' : '';
    return `<kbd>${escapeHtml(key)}</kbd>${plus}`;
  }).join('');
}

// 生成单个快捷键行的 HTML
function renderShortcutRow(shortcut, highlightQuery) {
  const label = highlightQuery
    ? highlightText(shortcut.label, highlightQuery)
    : escapeHtml(shortcut.label);

  const note = shortcut.note
    ? `<span class="shortcut-note">${escapeHtml(shortcut.note)}</span>`
    : '';

  const keyCombos = shortcut.keys.map(combo =>
    `<span class="key-combo">${renderKeyCombo(combo)}</span>`
  ).join('');

  return `
    <div class="shortcut-row">
      <span class="shortcut-label">${label}${note}</span>
      <span class="shortcut-keys">${keyCombos}</span>
    </div>
  `;
}

// 生成分类区块的 HTML
function renderCategory(cat, highlightQuery) {
  const rows = cat.shortcuts.map(s => renderShortcutRow(s, highlightQuery)).join('');
  return `
    <section class="category ${cat.cssClass}" id="${cat.id}">
      <div class="category-header">
        <div class="category-icon">${cat.icon}</div>
        <span class="category-title">${escapeHtml(cat.title)}</span>
        <span class="category-count">${cat.shortcuts.length}</span>
      </div>
      <div class="shortcuts-card">
        ${rows}
      </div>
    </section>
  `;
}

// 渲染全部内容
function renderAll(query) {
  const q = normalizeQuery(query);

  if (!q) {
    // 无搜索词，显示全部
    categoryNav.classList.remove('hidden');
    categoriesContainer.innerHTML = CATEGORIES.map(cat => renderCategory(cat, null)).join('');
    noResults.classList.add('hidden');
    return;
  }

  // 过滤
  const filtered = CATEGORIES.map(cat => ({
    ...cat,
    shortcuts: cat.shortcuts.filter(s => {
      const text = normalizeQuery(
        cat.title + ' ' +
        s.label + ' ' +
        (s.note || '') + ' ' +
        s.keys.map(combo => combo.join(' ')).join(' ')
      );
      return text.includes(q);
    })
  })).filter(cat => cat.shortcuts.length > 0);

  categoryNav.classList.add('hidden');

  if (filtered.length === 0) {
    categoriesContainer.innerHTML = '';
    noResults.classList.remove('hidden');
  } else {
    noResults.classList.add('hidden');
    categoriesContainer.innerHTML = filtered.map(cat => renderCategory(cat, query.trim())).join('');
  }
}

// ====== 工具函数 ======
function normalizeQuery(s) {
  return s.toLowerCase().replace(/\s+/g, ' ').trim();
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function highlightText(text, query) {
  if (!query) return escapeHtml(text);
  const escaped = escapeHtml(text);
  const escapedQuery = escapeHtml(query);
  const regex = new RegExp(`(${escapedQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return escaped.replace(regex, '<mark>$1</mark>');
}

// ====== 事件绑定 ======
// 搜索
let searchTimer;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    renderAll(searchInput.value);
  }, 120);
});

// 按 / 聚焦搜索
document.addEventListener('keydown', (e) => {
  if (e.key === '/' && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
  }
  if (e.key === 'Escape' && document.activeElement === searchInput) {
    searchInput.value = '';
    searchInput.blur();
    renderAll('');
  }
});

// 导航高亮（滚动时）
function updateActiveNav() {
  const sections = document.querySelectorAll('.category');
  const navLinks = document.querySelectorAll('.category-nav a');
  let activeId = null;

  sections.forEach(section => {
    const rect = section.getBoundingClientRect();
    if (rect.top <= 120) {
      activeId = section.id;
    }
  });

  navLinks.forEach(link => {
    link.classList.toggle('active', link.dataset.cat === activeId);
  });
}

let scrollTimer;
window.addEventListener('scroll', () => {
  clearTimeout(scrollTimer);
  scrollTimer = setTimeout(updateActiveNav, 50);
}, { passive: true });

// ====== 初始化 ======
renderNav(CATEGORIES);
renderAll('');
updateActiveNav();
</script>
